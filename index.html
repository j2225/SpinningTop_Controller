<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLE Microcontroller App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- SEO Best Practices -->
    <meta name="description" content="A premium Web BLE controller app for microcontrollers.">
</head>
<body>
    <header>
        <h1 class="logo">Spinning Top<br>Controller</h1>
        <button id="connectBtn" class="connect-btn">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
            </svg>
            <span class="text">Connect</span>
        </button>
    </header>

    <main class="controller-area">
        <div class="control-group">
            <button id="btnForward" class="action-btn forward-btn" data-val="1">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                <span>Forward</span>
            </button>
        </div>
        
        <div class="control-group">
            <button id="btnBackward" class="action-btn backward-btn" data-val="2">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                <span>Backward</span>
            </button>
        </div>

        <div class="control-group stop-group">
            <button id="btnStop" class="action-btn stop-btn" data-val="3">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
                <span>Stop</span>
            </button>
        </div>
    </main>

    <div id="statusOverlay" class="status-overlay hidden">
        <div class="status-content">
            <div class="spinner"></div>
            <p id="statusText">Connecting...</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
